name: Native FPK Build and Release

on:
  workflow_dispatch:

jobs:
  native:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: x86
            fpk_suffix: x86_64
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            arch: arm
            fpk_suffix: arm64
            use_cross: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: get_version
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Cross
        if: matrix.use_cross
        run: cargo install cross

      - name: Install Dependencies
        run: |
          cd frontend
          npm install

      - name: Build Frontend
        run: |
          cd frontend
          npm run build

      - name: Inject OpenSSL Vendored Dependency
        if: matrix.arch == 'arm'
        run: |
          cd backend
          # Inject openssl vendored dependency for static linking to avoid shared library issues
          if ! grep -q "^openssl" Cargo.toml; then
            sed -i '/^\[dependencies\]/a openssl = { version = "0.10", features = ["vendored"] }' Cargo.toml
            echo "Injected OpenSSL vendored dependency."
          else
            echo "OpenSSL dependency found, assuming it's correct."
          fi
          # Print first 20 lines to verify
          head -n 20 Cargo.toml

      - name: Build Backend
        run: |
          cd backend
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            # Create Cross.toml to install openssl dependencies in the container
            printf "[target.aarch64-unknown-linux-gnu]\npre-build = [\n    \"dpkg --add-architecture arm64\",\n    \"apt-get update && apt-get install -y libssl-dev:arm64\"\n]\n" > Cross.toml
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Prepare App Directory
        run: |
          mkdir -p .github/ting-reader-fpk-native/app/server
          echo "Listing target directory:"
          find backend/target -type f | grep "ting_reader" || true
          find backend/target -type f | grep "ting-reader" || true
          
          # Try to find binary with underscore (default for cargo) or hyphen
          BINARY_PATH=$(find backend/target -type f \( -name "ting_reader" -o -name "ting-reader" \) | grep "${{ matrix.target }}/release/ting[-_]reader$" | head -n 1)
          
          if [ -z "$BINARY_PATH" ]; then
            echo "Error: ting-reader binary not found in target directory!"
            exit 1
          fi
          
          echo "Found binary at: $BINARY_PATH"
          # Always copy as ting-reader (hyphen) to match scripts
          cp "$BINARY_PATH" .github/ting-reader-fpk-native/app/server/ting-reader
          
          cp backend/config.toml .github/ting-reader-fpk-native/app/server/
          cp -r frontend/dist .github/ting-reader-fpk-native/app/server/static
          chmod +x .github/ting-reader-fpk-native/app/server/ting-reader
          chmod +x .github/ting-reader-fpk-native/cmd/*

      - name: Prepare fnpack
        run: |
          # Use local fnpack if available, otherwise assume it's in PATH or download it
          # Since this job runs multiple times, we need to handle fnpack setup carefully or just reuse the logic
          # The original logic moved it to /usr/local/bin, which persists for the runner? 
          # No, runner is clean for each job usually, but matrix jobs might run in parallel on different runners.
          if [ ! -f /usr/local/bin/fnpack ]; then
            chmod +x .github/workflows/fnpack
            sudo cp .github/workflows/fnpack /usr/local/bin/fnpack
          fi

      - name: Build FPK
        run: |
          VERSION="${{ env.VERSION }}"
          # Update manifest with version and platform
          sed -i "s/^version[[:space:]]*=.*/version = $VERSION/" .github/ting-reader-fpk-native/manifest
          
          # Update arch/platform in manifest
          # Remove existing arch/platform lines to avoid duplication
          sed -i "/^arch[[:space:]]*=/d" .github/ting-reader-fpk-native/manifest
          sed -i "/^platform[[:space:]]*=/d" .github/ting-reader-fpk-native/manifest
          
          # Add new platform config
          # Using platform for new format, arch for compatibility if needed?
          # Doc says: "arch - 架构类型，目前固定为 x86_64废弃"
          # "platform - 架构类型... 声明为 x86 时... 声明为 arm 时..."
          # Let's use platform since it's the new standard
          echo "platform = ${{ matrix.arch }}" >> .github/ting-reader-fpk-native/manifest
          
          fnpack build --directory .github/ting-reader-fpk-native
          mv ting-reader.fpk ting-reader-native-${{ matrix.fpk_suffix }}-${VERSION}.fpk

      - name: Release Native FPK
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VERSION }}
          files: ting-reader-native-${{ matrix.fpk_suffix }}-${{ env.VERSION }}.fpk
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
