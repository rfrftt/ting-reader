name: Native FPK Build and Release

on:
  workflow_dispatch:

jobs:
  native:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: get_version
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install Dependencies
        run: |
          cd frontend
          npm install

      - name: Build Frontend
        run: |
          cd frontend
          npm run build

      - name: Build Backend
        run: |
          cd backend
          cargo build --release --target x86_64-unknown-linux-gnu

      - name: Prepare App Directory
        run: |
          mkdir -p .github/ting-reader-fpk-native/app/server
          echo "Listing target directory:"
          ls -R backend/target
          find backend/target -type f -name ting-reader -exec cp {} .github/ting-reader-fpk-native/app/server/ \;
          if [ ! -f .github/ting-reader-fpk-native/app/server/ting-reader ]; then
            echo "Error: ting-reader binary not found in target directory!"
            exit 1
          fi
          cp backend/config.toml .github/ting-reader-fpk-native/app/server/
          cp -r frontend/dist .github/ting-reader-fpk-native/app/server/static
          chmod +x .github/ting-reader-fpk-native/app/server/ting-reader
          chmod +x .github/ting-reader-fpk-native/cmd/*

      - name: Prepare fnpack
        run: |
          chmod +x .github/workflows/fnpack
          sudo mv .github/workflows/fnpack /usr/local/bin/fnpack

      - name: Build FPK
        run: |
          VERSION="${{ env.VERSION }}"
          sed -i "s/^version[[:space:]]*=.*/version = $VERSION/" .github/ting-reader-fpk-native/manifest
          fnpack build --directory .github/ting-reader-fpk-native
          mv ting-reader.fpk ting-reader-native-${VERSION}.fpk

      - name: Release Native FPK
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VERSION }}
          files: ting-reader-native-${{ env.VERSION }}.fpk
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
