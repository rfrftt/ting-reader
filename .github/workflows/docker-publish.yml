name: Docker Build, Push and FPK Release

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'Dockerfile'
      - 'package.json'
      - '.github/ting-reader-fpk/**'
      - '.github/workflows/docker-publish.yml'

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      release_exists: ${{ steps.check_release.outputs.exists }}
      should_build: ${{ steps.filter.outputs.docker }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            docker:
              - 'backend/**'
              - 'frontend/**'
              - 'Dockerfile'
              - 'docker-compose.yml'
            fpk:
              - '.github/ting-reader-fpk/**'
              - '.github/workflows/fnpack'

      - name: Get version from package.json
        id: get_version
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if release exists
        id: check_release
        run: |
          if gh release view "v${{ env.VERSION }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Release v${{ env.VERSION }} already exists. Skipping release steps."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Release v${{ env.VERSION }} does not exist. Proceeding with build and release."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    needs: prepare
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: dqsq2e2/ting-reader
          tags: |
            type=raw,value=beta

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=dqsq2e2/ting-reader,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=build-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.platform }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ strategy.job-index }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: [prepare, docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create manifest list and push (Beta)
        if: github.event_name == 'workflow_dispatch' && needs.prepare.outputs.release_exists == 'true'
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            --tag dqsq2e2/ting-reader:beta \
            $(printf 'dqsq2e2/ting-reader@sha256:%s ' *)

      - name: Create manifest list and push (Release)
        if: needs.prepare.outputs.release_exists != 'true'
        working-directory: /tmp/digests
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          docker buildx imagetools create \
            --tag dqsq2e2/ting-reader:latest \
            --tag dqsq2e2/ting-reader:$VERSION \
            $(printf 'dqsq2e2/ting-reader@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect dqsq2e2/ting-reader:${{ needs.prepare.outputs.release_exists == 'true' && 'beta' || needs.prepare.outputs.version }}

  release:
    needs: [prepare, merge]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            fpk:
              - '.github/ting-reader-fpk/**'
              - '.github/workflows/fnpack'

      - name: Prepare fnpack
        if: needs.prepare.outputs.release_exists != 'true' || steps.filter.outputs.fpk == 'true'
        run: |
          chmod +x .github/workflows/fnpack
          sudo mv .github/workflows/fnpack /usr/local/bin/fnpack

      - name: Build FPK (Formal)
        if: needs.prepare.outputs.release_exists != 'true'
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          cp .github/ting-reader-fpk/manifest .github/ting-reader-fpk/manifest.bak
          sed -i "s/^version[[:space:]]*=.*/version = $VERSION/" .github/ting-reader-fpk/manifest
          fnpack build --directory .github/ting-reader-fpk
          mv ting-reader.fpk ting-reader-$VERSION.fpk
          mv .github/ting-reader-fpk/manifest.bak .github/ting-reader-fpk/manifest

      - name: Build FPK (Beta)
        if: steps.filter.outputs.fpk == 'true'
        run: |
          sed -i "s/^version[[:space:]]*=.*/version = beta/" .github/ting-reader-fpk/manifest
          fnpack build --directory .github/ting-reader-fpk
          mv ting-reader.fpk ting-reader-beta.fpk

      - name: Update Beta Tag
        if: steps.filter.outputs.fpk == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git tag -f beta
          git push origin beta --force

      - name: Release Beta FPK
        uses: softprops/action-gh-release@v1
        if: steps.filter.outputs.fpk == 'true'
        with:
          tag_name: beta
          name: Beta Release
          body: "Latest beta build of ting-reader FPK."
          prerelease: true
          make_latest: false
          files: ting-reader-beta.fpk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Release Notes
        id: extract_notes
        if: github.ref == 'refs/heads/main' && needs.prepare.outputs.release_exists != 'true'
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          START_LINE=$(grep -n "## \[$VERSION\]" CHANGELOG.md | cut -d: -f1)
          if [ -n "$START_LINE" ]; then
            tail -n +$START_LINE CHANGELOG.md | sed -n '1p; 2,${/## \[/q; p}' > RELEASE_NOTES.md
          else
            echo "Version $VERSION not found in CHANGELOG.md"
            echo "Full changelog available in CHANGELOG.md" > RELEASE_NOTES.md
          fi

      - name: Update Git Tag
        if: github.ref == 'refs/heads/main' && needs.prepare.outputs.release_exists != 'true'
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git tag -f v$VERSION
          git push origin v$VERSION --force

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: github.ref == 'refs/heads/main' && needs.prepare.outputs.release_exists != 'true'
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: Release v${{ needs.prepare.outputs.version }}
          body_path: RELEASE_NOTES.md
          fail_on_unmatched_files: false
          files: |
            ting-reader-${{ needs.prepare.outputs.version }}.fpk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
